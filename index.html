            { name: "김민지", age: 26, caps: 10, country: "대한민국" },
            { name: "김선아", age: 25, caps: 35, country: "대한민국" },
            { name: "이가은", age: 24, caps: 6, country: "대한민국" },
            { name: "이주연", age: 25, caps: 9, country: "대한민국" },
            { name: "이서연", age: 23, caps: 10, country: "대한민국" },
            { name: "이유진", age: 23, caps: 30, country: "대한민국" },
            { name: "이유리", age: 31, caps: 133, country: "대한민국" },
            { name: "문승화", age: 29, caps: 0, country: "대한민국" },
            { name: "박승애", age: 26, caps: 48, country: "대한민국" },
            { name: "박영은", age: 22, caps: 18, country: "대한민국" }
        ];

        // 전체 평균 계산
        const totalPlayers = playersData.length;
        const globalAvgAge = playersData.reduce((sum, p) => sum + p.age, 0) / totalPlayers;
        const globalAvgCaps = playersData.reduce((sum, p) => sum + p.caps, 0) / totalPlayers;

        // 국가별 색상 및 그룹핑 준비
        const colorMap = {
            "대한민국": "#ef4444",   // Red
            "오스트리아": "#3b82f6", // Blue
            "잉글랜드": "#10b981",  // Green
            "이탈리아": "#8b5cf6"    // Purple
        };

        const countries = Object.keys(colorMap);
        const traces = [];
        const avgMarkers = { x: [], y: [], text: [], mode: 'markers+text', marker: { symbol: 'star', size: 14, color: '#f59e0b', line: {width: 1, color: '#78350f'} }, name: '국가별 평균 좌표', textposition: 'bottom center', textfont: { weight: 'bold', color: '#b45309' } };

        countries.forEach(country => {
            const cPlayers = playersData.filter(p => p.country === country);
            
            // 각 국가별 평균 계산
            const cAvgAge = cPlayers.reduce((sum, p) => sum + p.age, 0) / cPlayers.length;
            const cAvgCaps = cPlayers.reduce((sum, p) => sum + p.caps, 0) / cPlayers.length;

            avgMarkers.x.push(cAvgAge);
            avgMarkers.y.push(cAvgCaps);
            avgMarkers.text.push(`${country} 평균<br>(${cAvgAge.toFixed(1)}세, ${cAvgCaps.toFixed(1)}경기)`);

            // 선수별 데이터 정리
            const trace = {
                x: cPlayers.map(p => p.age),
                y: cPlayers.map(p => p.caps),
                text: cPlayers.map(p => {
                    // 대한민국 선수는 모두 표시, 타 국가는 전체 평균 경기수 이상 베테랑만 표시
                    if (country === "대한민국" || p.caps >= globalAvgCaps) {
                        return p.name;
                    }
                    return "";
                }),
                mode: 'markers+text',
                type: 'scatter',
                name: country,
                textposition: 'top center',
                textfont: { size: 10 },
                marker: { size: 10, color: colorMap[country], opacity: 0.8, line: {width: 1, color: 'white'} },
                hovertemplate: '<b>%{text}</b><br>나이: %{x}세<br>경기수: %{y} Caps<extra></extra>'
            };
            
            // 호버 텍스트가 빈 문자열(이름 안 보이는 선수)인 경우 대체 호버 텍스트 적용
            trace.hovertemplate = cPlayers.map(p => 
                `<b>${p.name}</b><br>소속: ${country}<br>나이: ${p.age}세<br>출장: ${p.caps}경기<extra></extra>`
            );
            
            traces.push(trace);
        });

        // 가상 평균점 트레이스를 가장 마지막에 추가 (최상단 노출)
        traces.push(avgMarkers);

        const layout = {
            hovermode: 'closest',
            xaxis: { title: '선수 나이 (세)', titlefont: { weight: 'bold' }, showgrid: true, zeroline: false, range: [15, 40] },
            yaxis: { title: 'A매치 출장 수 (Caps)', titlefont: { weight: 'bold' }, showgrid: true, zeroline: false },
            margin: { l: 60, r: 40, t: 40, b: 60 },
            legend: { orientation: 'h', y: -0.15, x: 0.5, xanchor: 'center' },
            shapes: [
                // 전체 평균 나이 점선 (X축)
                {
                    type: 'line',
                    x0: globalAvgAge, y0: 0,
                    x1: globalAvgAge, y1: 160,
                    line: { color: 'gray', width: 2, dash: 'dash' }
                },
                // 전체 평균 경기수 점선 (Y축)
                {
                    type: 'line',
                    x0: 15, y0: globalAvgCaps,
                    x1: 40, y1: globalAvgCaps,
                    line: { color: 'gray', width: 2, dash: 'dash' }

                    xref: 'x', yref: 'y',
                    text: `전체 평균 나이 (${globalAvgAge.toFixed(1)}세)`,
                    showarrow: false, xanchor: 'left', xshift: 5,
                    font: { color: 'gray', size: 12 }
                },
                {
                    x: 38, y: globalAvgCaps,
                    xref: 'x', yref: 'y',
                    text: `전체 평균 경기수 (${globalAvgCaps.toFixed(1)}경기)`,
                    showarrow: false, yanchor: 'bottom', yshift: 5,
                    font: { color: 'gray', size: 12 }
                }
            ]
        };

        const config = { responsive: true, displayModeBar: false };

        Plotly.newPlot('plot-container', traces, layout, config);
    </script>
</body>
