    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        #chart-area { height: 750px; width: 100%; }
        .chart-container { background: white; border-radius: 1rem; shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    </style>
</head>

            { name: "MUNITIS Emilia", age: 29, caps: 50, country: "이탈리아", color: "#8b5cf6" },
            { name: "OVIEDO Ailin", age: 35, caps: 40, country: "이탈리아", color: "#8b5cf6" }
        ];

        const countries = ["대한민국", "오스트리아", "잉글랜드", "이탈리아"];
        const countryColors = { "대한민국": "#ef4444", "오스트리아": "#3b82f6", "잉글랜드": "#10b981", "이탈리아": "#8b5cf6" };

        function createTraces() {
            return countries.map(country => {
                const cPlayers = rawData.filter(p => p.country === country);
                return {
                    x: cPlayers.map(p => p.age),
                    y: cPlayers.map(p => p.caps),
                    text: cPlayers.map(p => p.name),
                    mode: 'markers',
                    name: country,
                    marker: {
                        size: 12,
                        color: countryColors[country],
                        opacity: 0.3, // 기본 상태는 흐리게
                        line: { width: 1, color: 'white' }
                    },
                    customdata: cPlayers.map(p => p.country),
                    hovertemplate: '<b>%{text}</b><br>국가: %{customdata}<br>나이: %{x}세<br>출장: %{y}경기<extra></extra>'
                };
            });
        }

        const layout = {
            xaxis: { title: '선수 나이 (Age)', range: [15, 40], gridcolor: '#f1f5f9' },
            yaxis: { title: 'A매치 출장 수 (Caps)', gridcolor: '#f1f5f9' },
            showlegend: true,
            legend: { x: 1, y: 1, xanchor: 'right', bgcolor: 'rgba(255,255,255,0.8)' },
            margin: { l: 60, r: 40, t: 40, b: 60 },
            hovermode: 'closest',
            plot_bgcolor: 'white',
            shapes: [
                { type: 'line', x0: 25.8, y0: 0, x1: 25.8, y1: 160, line: { color: '#cbd5e1', width: 1, dash: 'dot' } },
                { type: 'line', x0: 15, y0: 32.3, x1: 40, y1: 32.3, line: { color: '#cbd5e1', width: 1, dash: 'dot' } }
            ]
        };

        Plotly.newPlot('chart-area', createTraces(), layout, {responsive: true});

        const myPlot = document.getElementById('chart-area');

        // 마우스 오버 이벤트: 같은 국가 선수들 하이라이트
        myPlot.on('plotly_hover', function(data){
            const hoveredCountry = data.points[0].customdata;
            const update = {
                'marker.opacity': countries.map(c => c === hoveredCountry ? 1.0 : 0.1),
                'marker.size': countries.map(c => c === hoveredCountry ? 15 : 8)
            };
            Plotly.restyle('chart-area', update);
        });

        // 마우스 아웃 이벤트: 다시 원래대로 (흐리게)
        myPlot.on('plotly_unhover', function(data){
            const update = {
                'marker.opacity': 0.3,
                'marker.size': 12
            };
            Plotly.restyle('chart-area', update);
        });

    </script>
