        ];

        const countries = ["대한민국", "오스트리아", "잉글랜드", "이탈리아"];
        const countryColors = { "대한민국": "#ef4444", "오스트리아": "#3b82f6", "잉글랜드": "#10b981", "이탈리아": "#8b5cf6" };

        function getTraces() {
            let playerTraces = [];
            let avgTraces = [];
            
            countries.forEach(country => {
                const players = allPlayers.filter(p => p.country === country);
                // 1. 개별 선수 점
                playerTraces.push({
                    x: players.map(p => p.age),
                    y: players.map(p => p.caps),
                    text: players.map(p => `<b>#${p.no} ${p.name}</b>`),
                    customdata: players.map(p => p.country),
                    mode: 'markers',
                    name: country,
                    legendgroup: country,
                    marker: { size: 13, color: countryColors[country], opacity: 0.3, line: { width: 1, color: 'white' } },
                    hovertemplate: '%{text}<br>국가: %{customdata}<br>나이: %{x}세<br>출장: %{y} Caps<extra></extra>'
                });

                // 2. 국가별 평균 별표
                const avgAge = players.reduce((sum, p) => sum + p.age, 0) / players.length;
                const avgCaps = players.reduce((sum, p) => sum + p.caps, 0) / players.length;
                avgTraces.push({
                    x: [avgAge],
                    y: [avgCaps],
                    text: [`<b>${country} 평균치</b>`],
                    customdata: [country],
                    mode: 'markers',
                    name: `${country} 평균`,
                    legendgroup: country,
                    showlegend: false,
                    marker: { symbol: 'star', size: 22, color: countryColors[country], line: { width: 2, color: '#1e293b' } },
                    hovertemplate: '<b>%{text}</b><br>평균 나이: %{x:.1f}세<br>평균 출장: %{y:.1f} Caps<extra></extra>'
                });
            });
            return [...playerTraces, ...avgTraces];
        }

        const layout = {
            xaxis: { title: '연령 (Age)', range: [15, 40], gridcolor: '#e2e8f0', zeroline: false },
            yaxis: { title: 'A매치 출장 수 (Caps)', range: [-5, 175], gridcolor: '#e2e8f0', zeroline: false },
            margin: { l: 60, r: 40, t: 40, b: 60 },
            hovermode: 'closest',
            plot_bgcolor: 'white',
            legend: { 
                x: 1, y: 1.05, xanchor: 'right', yanchor: 'bottom', 
                orientation: 'h', font: { size: 12 },
                itemclick: 'toggle',
                itemdoubleclick: 'toggle'
            },
            shapes: [
                { type: 'line', x0: 25.8, y0: 0, x1: 25.8, y1: 170, line: { color: '#94a3b8', width: 1, dash: 'dash' } },
                { type: 'line', x0: 15, y0: 32.3, x1: 40, y1: 32.3, line: { color: '#94a3b8', width: 1, dash: 'dash' } }
            ]
        };

        Plotly.newPlot('chart-area', getTraces(), layout, {responsive: true, displayModeBar: false});

        const myPlot = document.getElementById('chart-area');

        // 하이라이트 효과 (인덱스 보정 완료)
        myPlot.on('plotly_hover', function(data){
            const hoveredCountry = data.points[0].customdata;
            const opacities = [];
            const sizes = [];

            // 0~3번 인덱스는 점, 4~7번 인덱스는 별표
            countries.forEach((c, i) => {
                const isMatch = (c === hoveredCountry);
                // 점(Scatter) 데이터용 설정
                opacities[i] = isMatch ? 1.0 : 0.05;
                sizes[i] = isMatch ? 16 : 8;
                // 별표(Star) 데이터용 설정 (인덱스 + 4)
                opacities[i + 4] = isMatch ? 1.0 : 0.05;
                sizes[i + 4] = isMatch ? 28 : 12;
            });

            Plotly.restyle('chart-area', { 'marker.opacity': opacities, 'marker.size': sizes });
        });

        myPlot.on('plotly_unhover', function(data){
            // 기본 상태로 복구 (점 0.3, 별표 1.0)
            const defaultOpacities = [0.3, 0.3, 0.3, 0.3, 1.0, 1.0, 1.0, 1.0];
            const defaultSizes = [13, 13, 13, 13, 22, 22, 22, 22];
            Plotly.restyle('chart-area', { 'marker.opacity': defaultOpacities, 'marker.size': defaultSizes });
        });
