        var countryAverages = {"한국":{"age":24.9,"caps":25.45,"color":"#ef4444"},"오스트리아":{"age":23.5,"caps":25.83,"color":"#3b82f6"},"잉글랜드":{"age":26.75,"caps":48.4,"color":"#10b981"},"이탈리아":{"age":27.8,"caps":27.35,"color":"#8b5cf6"},"스코틀랜드":{"age":26.32,"caps":46.53,"color":"#0ea5e9"},"우루과이":{"age":24.72,"caps":26.44,"color":"#f59e0b"},"웨일스":{"age":23.9,"caps":32.4,"color":"#ec4899"}};

        const countries = Object.keys(countryAverages);

        // 현재 화면이 모바일인지 판단 (화면 너비 기준)
        const isMobile = window.innerWidth < 768;

        function createTraces() {
            let traces = [];
            countries.forEach(c => {
                const c_players = allPlayers.filter(p => p.country === c);
                
                const grouped = {};
                c_players.forEach(p => {
                    const key = `${p.age}-${p.caps}`;
                    if (!grouped[key]) grouped[key] = [];
                    grouped[key].push(p);
                });

                const finalX = [], finalY = [], finalText = [], finalCustom = [];
                Object.values(grouped).forEach(group => {
                    finalX.push(group[0].age);
                    finalY.push(group[0].caps);
                    finalText.push(`<b>${group.map(p => `#${p.no} ${p.name}`).join(" & ")}</b>`);
                    finalCustom.push(c);
                });

                // 모바일 환경일 경우 점(Scatter)의 기본 크기를 줄임
                traces.push({
                    x: finalX, y: finalY, text: finalText, customdata: finalCustom,
                    mode: 'markers', name: c, legendgroup: c,
                    marker: { 
                        size: isMobile ? 10 : 14, 
                        color: countryAverages[c].color, 
                        opacity: 0.35, 
                        line: { width: 1, color: 'white' } 
                    },
                    hovertemplate: '%{text}<br>국가: %{customdata}<br>나이: %{x}세<br>출장: %{y} Caps<extra></extra>'
                });

                // 모바일 환경일 경우 평균 별표(Star)의 기본 크기를 줄임
                traces.push({
                    x: [countryAverages[c].age], y: [countryAverages[c].caps],
                    text: [`<b>${c} 평균</b>`], customdata: [c],
                    mode: 'markers', name: `${c} 평균`, legendgroup: c, showlegend: false,
                    marker: { 
                        symbol: 'star', 
                        size: isMobile ? 20 : 28, 
                        color: countryAverages[c].color, 
                        line: { width: 2, color: '#0f172a' } 
                    },
                    hovertemplate: '<b>%{text}</b><br>평균 나이: %{x}세<br>평균 출장: %{y} Caps<extra></extra>'
                });
            });
            return traces;
        }

        const layout = {
            hovermode: 'closest',
            xaxis: { title: '연령 (Age)', range: [15, 40], gridcolor: '#e2e8f0', zeroline: false },
            yaxis: { title: 'A매치 경기수 (Caps)', range: [-5, 175], gridcolor: '#e2e8f0', zeroline: false },
            
            // 모바일이면 좌우/상하 여백을 확 줄여 그래프를 최대한 키움
            margin: { 
                l: isMobile ? 40 : 60, 
                r: isMobile ? 20 : 40, 
                t: isMobile ? 20 : 40, 
                b: isMobile ? 80 : 60 
            },
            
            // 범례(Legend) 설정: 모바일은 하단 중앙, PC는 우측 상단
            legend: { 
                orientation: 'h', 
                y: isMobile ? -0.2 : 1.05, 
                x: isMobile ? 0.5 : 1, 
                xanchor: isMobile ? 'center' : 'right',
                yanchor: 'top',
                font: { size: isMobile ? 10 : 12 },
                itemclick: 'toggle', itemdoubleclick: 'toggle'
            },
            plot_bgcolor: 'white',
            shapes: [
                { type: 'rect', x0: 15, y0: AVG_CAPS_GLOBAL, x1: AVG_AGE_GLOBAL, y1: 175, fillcolor: '#dcfce7', opacity: 0.3, line: {width: 0}, layer: 'below' },
                { type: 'rect', x0: AVG_AGE_GLOBAL, y0: AVG_CAPS_GLOBAL, x1: 40, y1: 175, fillcolor: '#dbeafe', opacity: 0.3, line: {width: 0}, layer: 'below' },
                { type: 'rect', x0: 15, y0: -5, x1: AVG_AGE_GLOBAL, y1: AVG_CAPS_GLOBAL, fillcolor: '#fef9c3', opacity: 0.3, line: {width: 0}, layer: 'below' },
                { type: 'rect', x0: AVG_AGE_GLOBAL, y0: -5, x1: 40, y1: AVG_CAPS_GLOBAL, fillcolor: '#fee2e2', opacity: 0.3, line: {width: 0}, layer: 'below' },
                { type: 'line', x0: AVG_AGE_GLOBAL, y0: -5, x1: AVG_AGE_GLOBAL, y1: 175, line: { color: '#94a3b8', width: 2, dash: 'dashdot' } },
                { type: 'line', x0: 15, y0: AVG_CAPS_GLOBAL, x1: 40, y1: AVG_CAPS_GLOBAL, line: { color: '#94a3b8', width: 2, dash: 'dashdot' } }
            ]
        };

        // 반응형 활성화 (기기 회전 시 자동 조절됨)
        const config = { responsive: true, displayModeBar: false };
        Plotly.newPlot('chart-area', createTraces(), layout, config);

        const myPlot = document.getElementById('chart-area');

        // 하이라이트 효과 (모바일/PC 동적 크기 반영)
        myPlot.on('plotly_hover', function(data){
            const hoveredCountry = data.points[0].customdata;
            const opacities = [], sizes = [];
            countries.forEach((c, i) => {
                const isMatch = (c === hoveredCountry);
                // 선수 점 크기 변화
                opacities[i*2] = isMatch ? 1.0 : 0.05;
                sizes[i*2] = isMatch ? (isMobile ? 14 : 18) : (isMobile ? 6 : 8);
                // 평균 별표 크기 변화
                opacities[i*2+1] = isMatch ? 1.0 : 0.05;
                sizes[i*2+1] = isMatch ? (isMobile ? 26 : 35) : (isMobile ? 12 : 12);
            });
            Plotly.restyle('chart-area', { 'marker.opacity': opacities, 'marker.size': sizes });
        });

        myPlot.on('plotly_unhover', function(){
            const defaultOpacities = [], defaultSizes = [];
            countries.forEach((c, i) => {
                defaultOpacities[i*2] = 0.35; 
                defaultSizes[i*2] = isMobile ? 10 : 14; // 복구 크기
                defaultOpacities[i*2+1] = 1.0; 
                defaultSizes[i*2+1] = isMobile ? 20 : 28; // 복구 크기
            });
            Plotly.restyle('chart-area', { 'marker.opacity': defaultOpacities, 'marker.size': defaultSizes });
        });

        // 윈도우 사이즈가 변할 때(예: 스마트폰 가로/세로 전환) 레이아웃 자동 새로고침
        window.addEventListener('resize', () => {
            const newIsMobile = window.innerWidth < 768;
            Plotly.relayout('chart-area', {
                'margin.l': newIsMobile ? 40 : 60,
                'margin.r': newIsMobile ? 20 : 40,
                'margin.b': newIsMobile ? 80 : 60,
                'legend.y': newIsMobile ? -0.2 : 1.05,
                'legend.x': newIsMobile ? 0.5 : 1,
                'legend.xanchor': newIsMobile ? 'center' : 'right',
                'legend.font.size': newIsMobile ? 10 : 12
            });
        });

        // 하단 요약표 출력 (카드 UI 반응형)
        const summaryDiv = document.getElementById('stats-summary');
        countries.forEach(c => {
            const card = document.createElement('div');
            card.className = "bg-white p-3 md:p-4 rounded-xl shadow-sm border-l-4 text-center md:text-left";
            card.style.borderColor = countryAverages[c].color;
            card.innerHTML = `
                <h3 class="font-bold text-slate-800 text-xs md:text-sm">${c}</h3>
                <div class="md:block flex justify-center gap-3 md:gap-0 mt-1 md:mt-2">
                    <p class="text-[11px] md:text-xs text-slate-500">Age: <span class="text-slate-900 font-semibold">${countryAverages[c].age}세</span></p>
                    <p class="text-[11px] md:text-xs text-slate-500">Caps: <span class="text-slate-900 font-semibold">${countryAverages[c].caps}회</span></p>
                </div>
            `;
            summaryDiv.appendChild(card);
        });
    </script>
</body>
</html>
